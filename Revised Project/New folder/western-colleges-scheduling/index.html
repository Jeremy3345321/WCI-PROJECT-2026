<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Western Colleges &mdash; Scheduling</title>
<link rel="icon" href="assets/img/logo1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="assets/img/logo1.png" alt="Western Colleges seal" class="brand-seal">
      <div class="brand-text">
        <span class="brand-name">Western Colleges Inc.</span>
        <span class="brand-sub">High School Department</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
      <button class="nav-item is-active" data-view="teacher">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7.5" r="3.2"/><path d="M4.5 20c0-3.6 3.2-6.2 7.5-6.2s7.5 2.6 7.5 6.2"/></svg>
        <span>Teacher Schedule</span>
      </button>
      <button class="nav-item" data-view="section">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="4.5" width="17" height="15" rx="1.6"/><path d="M3.5 9.3h17M8 4.5v3M16 4.5v3"/></svg>
        <span>Section Schedule</span>
      </button>
      <button class="nav-item" data-view="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="5" width="17" height="15.5" rx="1.6"/><path d="M3.5 9.6h17M8 3.2v3.4M16 3.2v3.4"/><circle cx="8" cy="13.3" r=".9" fill="currentColor" stroke="none"/><circle cx="12" cy="13.3" r=".9" fill="currentColor" stroke="none"/><circle cx="16" cy="13.3" r=".9" fill="currentColor" stroke="none"/><circle cx="8" cy="16.8" r=".9" fill="currentColor" stroke="none"/><circle cx="12" cy="16.8" r=".9" fill="currentColor" stroke="none"/></svg>
        <span>School Calendar</span>
      </button>
    </nav>

    <div class="sidebar-foot">
      <span class="foot-motto">Rectitae et Candidae</span>
      <span class="foot-est">Est. 1945 &middot; Naic, Cavite</span>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- ---------- TEACHER SCHEDULE VIEW ---------- -->
    <section class="view is-active" id="view-teacher">
      <header class="view-header">
        <div>
          <p class="view-eyebrow">Faculty</p>
          <h1 class="view-title">Teacher Schedule</h1>
        </div>
        <div class="view-actions">
          <select id="teacherSelect" class="select-control"></select>
          <button class="btn btn-ghost" id="manageTeachersBtn">Manage Teachers</button>
          <button class="btn btn-primary" id="addTeacherSlotBtn">+ Add Class</button>
        </div>
      </header>

      <div class="teacher-meta" id="teacherMeta"></div>

      <div class="grid-wrap">
        <table class="schedule-grid" id="teacherGrid">
          <thead><tr id="teacherGridHead"></tr></thead>
          <tbody id="teacherGridBody"></tbody>
        </table>
      </div>
    </section>

    <!-- ---------- SECTION SCHEDULE VIEW ---------- -->
    <section class="view" id="view-section">
      <header class="view-header">
        <div>
          <p class="view-eyebrow">Sections</p>
          <h1 class="view-title">Section Schedule</h1>
        </div>
        <div class="view-actions">
          <select id="sectionSelect" class="select-control"></select>
          <button class="btn btn-ghost" id="manageSectionsBtn">Manage Sections</button>
          <button class="btn btn-primary" id="addSectionSlotBtn">+ Add Subject</button>
        </div>
      </header>

      <div class="teacher-meta" id="sectionMeta"></div>

      <div class="grid-wrap">
        <table class="schedule-grid" id="sectionGrid">
          <thead><tr id="sectionGridHead"></tr></thead>
          <tbody id="sectionGridBody"></tbody>
        </table>
      </div>
    </section>

    <!-- ---------- CALENDAR VIEW ---------- -->
    <section class="view" id="view-calendar">
      <header class="view-header">
        <div>
          <p class="view-eyebrow">School Year</p>
          <h1 class="view-title">Western College School Calendar</h1>
        </div>
        <div class="view-actions">
          <button class="btn btn-ghost" id="todayBtn">Today</button>
          <button class="btn btn-primary" id="addEventBtn">+ Add Event</button>
        </div>
      </header>

      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="cal-arrow" id="prevMonthBtn" aria-label="Previous month">&#8249;</button>
          <h2 class="cal-month-label" id="calMonthLabel"></h2>
          <button class="cal-arrow" id="nextMonthBtn" aria-label="Next month">&#8250;</button>
        </div>
        <div class="cal-legend">
          <span class="legend-chip"><i class="dot dot-holiday"></i>Holiday</span>
          <span class="legend-chip"><i class="dot dot-event"></i>School Event</span>
          <span class="legend-chip"><i class="dot dot-exam"></i>Exam Period</span>
        </div>
      </div>

      <div class="cal-grid-wrap">
        <div class="cal-weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="cal-upcoming">
        <h3>Upcoming</h3>
        <ul id="upcomingList" class="upcoming-list"></ul>
      </div>
    </section>

  </main>
</div>

<!-- ===== MODALS (shared) ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard"></div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/store.js"></script>
<script src="assets/js/teacher-view.js"></script>
<script src="assets/js/section-view.js"></script>
<script src="assets/js/calendar-view.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
